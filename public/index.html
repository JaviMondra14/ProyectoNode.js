<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Sistema de Empleados - Login</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="./js/index.js"></script>
</head>

<body>
    <div class="container_2 mt-5">
        <div class="row">
            <div class="col-md-6 offset-md-3">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h3>Sistema de Empleados</h3>
                    </div>
                    <div class="card-body">
                        <h4 class="card-title mb-4">Inicia sesión</h4>
                        <form id="loginForm">
                            <div class="form-group">
                                <label for="email">Correo electrónico</label>
                                <input type="email" class="form-control" id="email" placeholder="correo@email.com" required>
                                <small class="form-text text-muted">El correo con el que te registraste.</small>
                            </div>
                            <div class="form-group">
                                <label for="password">Contraseña</label>
                                <input type="password" class="form-control" id="password" placeholder="***********" required>
                            </div>
                            <div id="errorAlert" class="alert alert-danger" role="alert" style="display:none;"></div>
                            <div class="d-flex justify-content-between">
                                <button type="submit" class="btn btn-primary">Entrar</button>
                                <button type="button" class="btn btn-secondary" onclick="goToSignin()">Registro</button>
                            </div>
                        </form>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
