<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Sistema de Empleados - Registro</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="./js/config.js"></script>
    <script src="./js/signin.js"></script>
</head>

<body>
    <div class="container_2 mt-5">
        <div class="row">
            <div class="col-md-6 offset-md-3">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h3>Registrar nuevo usuario</h3>
                    </div>
                    <div class="card-body">
                        <form id="signinForm">
                            <div class="form-group">
                                <label for="nombre">Nombre completo</label>
                                <input type="text" class="form-control" id="nombre" placeholder="Tu nombre" required>
                            </div>
                            <div class="form-group">
                                <label for="email">Correo electrónico</label>
                                <input type="email" class="form-control" id="email" placeholder="correo@email.com" required>
                                <small class="form-text text-muted">Usa un correo único.</small>
                            </div>
                            <div class="form-group">
                                <label for="password">Contraseña</label>
                                <input type="password" class="form-control" id="password" placeholder="***********" required>
                            </div>
                            <div class="form-group">
                                <label for="confirmPassword">Confirmar contraseña</label>
                                <input type="password" class="form-control" id="confirmPassword" placeholder="***********" required>
                            </div>
                            <div id="errorAlert" class="alert alert-danger" role="alert" style="display:none;"></div>
                            <div id="successAlert" class="alert alert-success" role="alert" style="display:none;"></div>
                            <div class="d-flex justify-content-between">
                                <button type="submit" class="btn btn-success">Registrarse</button>
                                <button type="button" class="btn btn-secondary" onclick="goToLogin()">Volver a login</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
